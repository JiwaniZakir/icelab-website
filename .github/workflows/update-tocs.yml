name: Update TOCs

on:
  push:
    branches: [main]
    paths:
      - "*.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-tocs
  cancel-in-progress: true

jobs:
  update-tocs:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46
        with:
          files: ./*.md

      - name: Update TOC in changed markdown files
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          curl https://raw.githubusercontent.com/george-gca/github-markdown-toc/main/gh-md-toc -o gh-md-toc
          chmod a+x gh-md-toc
          for file in ${ALL_CHANGED_FILES}; do
            if [[ "$file" != *.md ]]; then
              continue
            fi
            ./gh-md-toc --indent 2 --insert --no-backup --hide-footer $file
          done
          rm gh-md-toc

      - name: Commit changes
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5.0.1
        with:
          commit_message: "chore: auto-update markdown TOC"
